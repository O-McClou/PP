<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Wakhan KI – Pax Pamir 2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8860b;--gold2:#d4a017;--sand:#f0e0b0;
  --bg:#0d0a04;--panel:#1a1208;--card-bg:#121008;
  --border:rgba(180,130,30,0.35);--border2:rgba(180,130,30,0.6);
  --text:#e8d5a0;--text2:#a08858;--text3:#686040;
  --brit:#3a7abf;--rus:#8b2020;--afg:#2a7a2a;
}
body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 56px;font-size:14px;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:9000;padding:16px;}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:22px 20px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;}
.modal-box h2{font-size:1.1rem;color:var(--gold2);text-align:center;font-weight:600;}
.modal-box p{font-size:.82rem;color:var(--text2);line-height:1.5;}
.modal-box label{font-size:.78rem;color:var(--text2);display:block;margin-bottom:5px;}
.loy-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.lbtn{padding:8px 16px;border-radius:8px;border:2px solid;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;}
.lbtn.brit{border-color:var(--brit);color:var(--brit);}
.lbtn.brit.sel{background:var(--brit);color:#fff;}
.lbtn.rus{border-color:var(--rus);color:var(--rus);}
.lbtn.rus.sel{background:var(--rus);color:#fff;}
.lbtn.afg{border-color:var(--afg);color:var(--afg);}
.lbtn.afg.sel{background:var(--afg);color:#fff;}
.setup-step{display:none;}
.setup-step.act{display:block;}

/* ── LOYALTY BAR ── */
.loy-bar{width:100%;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.5);}
.loy-group{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.loy-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.loy-pill{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:12px;border:1.5px solid;cursor:pointer;transition:all .2s;}
.loy-pill.brit{border-color:var(--brit);color:var(--brit);}
.loy-pill.brit.sel{background:var(--brit);color:#fff;}
.loy-pill.rus{border-color:var(--rus);color:var(--rus);}
.loy-pill.rus.sel{background:var(--rus);color:#fff;}
.loy-pill.afg{border-color:var(--afg);color:var(--afg);}
.loy-pill.afg.sel{background:var(--afg);color:#fff;}
.wak-loy{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:12px;background:rgba(180,130,20,.15);border:1.5px solid var(--gold2);color:var(--gold2);}
.pref-suit{font-size:.7rem;color:var(--text3);}
.pref-suit span{color:var(--text2);font-weight:600;}

/* ── MAIN WRAP ── */
.main{width:100%;max-width:440px;padding:14px 12px;display:flex;flex-direction:column;gap:12px;}
h1{font-size:clamp(1.2rem,5vw,1.7rem);color:var(--gold2);letter-spacing:.1em;text-align:center;font-weight:600;}
.subtitle{font-size:.78rem;color:var(--text3);text-align:center;font-style:italic;}
.divider{width:140px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto;}

/* ── RUPIEN ── */
.rupien-bar{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.rup-label{font-size:.75rem;color:var(--text2);text-transform:uppercase;font-weight:600;letter-spacing:.05em;}
.rup-count{font-size:1.3rem;font-weight:700;color:var(--gold2);min-width:28px;text-align:center;}
.rup-btns{display:flex;gap:6px;margin-left:auto;}
.rup-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,.06);color:var(--text);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ── CARDS STAGE ── */
.stage{display:flex;gap:12px;align-items:flex-start;}
.slot{flex:1;display:flex;flex-direction:column;gap:5px;}
.slot-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;text-align:center;}
.frame{width:100%;aspect-ratio:2/3;border:1.5px solid var(--border);border-radius:10px;
  background:var(--card-bg);display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;cursor:pointer;transition:border-color .2s;box-shadow:inset 0 0 20px rgba(0,0,0,.5);}
.frame:hover{border-color:var(--gold2);}
.frame.hl{border-color:var(--gold2);box-shadow:0 0 16px rgba(212,160,23,.25);}
.frame img{width:100%;height:100%;object-fit:contain;display:none;}
.frame .ph{font-size:.78rem;color:var(--text3);text-align:center;padding:10px;line-height:1.5;display:flex;align-items:center;justify-content:center;height:100%;}
.badge{position:absolute;bottom:5px;right:5px;font-size:.65rem;background:rgba(0,0,0,.85);color:var(--gold2);border-radius:4px;padding:3px 6px;font-weight:600;}
.arr{position:absolute;top:5px;right:5px;font-size:.7rem;font-weight:700;border-radius:4px;padding:3px 7px;display:none;}
.arr.top{background:rgba(40,160,70,.9);color:#fff;}
.arr.bot{background:rgba(200,70,30,.9);color:#fff;}
.cnt{position:absolute;top:5px;left:5px;font-size:.65rem;background:rgba(0,0,0,.85);color:#ccc;border-radius:4px;padding:3px 6px;font-weight:600;}
