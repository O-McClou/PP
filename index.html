<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wakhan KI – Pax Pamir 2</title>
    <style>
        :root {
            --bg: #0d0a04;
            --panel: #1a1208;
            --card-bg: #121008;
            --gold: #c9a030;
            --gold2: #d4a017;
            --text: #e8d5a0;
            --text2: #a08858;
            --text3: #6b6040;
            --border: rgba(180, 130, 30, 0.3);
            --border2: rgba(180, 130, 30, 0.55);
            --brit: #4a8fd4;
            --rus: #c04040;
            --afg: #3a9a3a;
            --rad: #d07040;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 48px;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        .screen {
            width: 100%;
            max-width: 460px;
            padding: 12px 10px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .screen.active {
            display: flex;
        }
        h1 {
            font-size: 1.3rem;
            color: var(--gold2);
            text-align: center;
            letter-spacing: 0.06em;
            font-weight: 700;
        }
        .sub {
            font-size: 0.72rem;
            color: var(--text3);
            text-align: center;
            font-style: italic;
            margin-top: -4px;
        }
        .divider {
            width: 90px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 12px;
        }
        .card h2 {
            font-size: 0.9rem;
            color: var(--gold2);
            margin-bottom: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hl {
            color: #f0d060;
            font-weight: 600;
        }
        .warn {
            color: #e08070;
            font-weight: 600;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row.ctr {
            justify-content: center;
        }
        .row.spread {
            justify-content: space-between;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            border: none;
            border-radius: 7px;
            transition: all 0.15s;
            font-size: 0.82rem;
            padding: 10px 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.8;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f0d070, var(--gold2));
            color: #1a1000;
            box-shadow: 0 3px 12px rgba(180, 130, 20, 0.3);
            font-size: 0.88rem;
            padding: 12px 16px;
            width: 100%;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border2);
            color: var(--text);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text2);
        }
        .btn-sm {
            padding: 6px 10px;
            font-size: 0.75rem;
        }
        .btn-danger {
            background: transparent;
            border: 1px solid rgba(200, 60, 40, 0.5);
            color: #d08070;
        }
        .btn-full {
            width: 100%;
        }
        .loy-pills {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .loy-pill {
            padding: 7px 13px;
            border-radius: 18px;
            border: 2px solid;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            transition: all 0.2s;
        }
        .loy-pill.brit {
            border-color: var(--brit);
            color: var(--brit);
        }
        .loy-pill.brit.sel {
            background: var(--brit);
            color: #fff;
        }
        .loy-pill.rus {
            border-color: var(--rus);
            color: var(--rus);
        }
        .loy-pill.rus.sel {
            background: var(--rus);
            color: #fff;
        }
        .loy-pill.afg {
            border-color: var(--afg);
            color: var(--afg);
        }
        .loy-pill.afg.sel {
            background: var(--afg);
            color: #fff;
        }
        .info-tag {
            display: inline-block;
            font-size: 0.68rem;
            padding: 3px 7px;
            border-radius: 9px;
            font-weight: 600;
            margin: 1px;
        }
        .tag-wak {
            background: rgba(200, 160, 30, 0.2);
            border: 1px solid var(--gold2);
            color: var(--gold2);
        }
        .tag-suit {
            background: rgba(160, 130, 180, 0.2);
            border: 1px solid #a080c0;
            color: #c0a0d0;
        }
        .stage-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            justify-content: center;
        }
        .slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .slot-lbl {
            font-size: 0.6rem;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }
        .frame {
            width: 100%;
            aspect-ratio: 2/3;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .frame.hl {
            border-color: var(--gold2);
            box-shadow: 0 0 10px rgba(212, 160, 23, 0.2);
        }
        .frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .frame .ph {
            font-size: 0.7rem;
            color: var(--text3);
            text-align: center;
            padding: 8px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .loading-ring {
            width: 22px;
            height: 22px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            position: absolute;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .plus-sep {
            display: flex;
            align-items: center;
            padding-top: 40px;
            color: var(--text3);
            font-size: 1rem;
            flex-shrink: 0;
        }
        .arr-tag {
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            border-radius: 3px;
            padding: 2px 5px;
            display: none;
            z-index: 2;
        }
        .arr-tag.top {
            background: rgba(40, 160, 70, 0.85);
            color: #fff;
        }
        .arr-tag.bot {
            background: rgba(200, 70, 30, 0.85);
            color: #fff;
        }
        .badge-nr {
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 0.55rem;
            background: rgba(0, 0, 0, 0.75);
            color: var(--gold2);
            border-radius: 3px;
            padding: 1px 4px;
            display: none;
            z-index: 2;
        }
        .cnt-stack {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 0.55rem;
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            border-radius: 3px;
            padding: 1px 4px;
            z-index: 2;
        }
        .action-box {
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.84rem;
            line-height: 1.5;
        }
        .action-box.rad {
            border-left-color: var(--rad);
        }
        .action-box.warn {
            border-left-color: #c04040;
            background: rgba(180, 30, 30, 0.1);
        }
        .step-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            margin: 6px 0;
        }
        .step-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
            border: 1.5px solid var(--border2);
            color: var(--text3);
            flex-shrink: 0;
        }
        .step-dot.done {
            background: rgba(180, 140, 30, 0.25);
            border-color: var(--gold2);
            color: var(--gold2);
        }
        .step-dot.act {
            background: rgba(200, 160, 30, 0.4);
            border-color: var(--gold2);
            color: #fff;
            box-shadow: 0 0 8px rgba(200, 160, 30, 0.4);
            animation: pulse 1.5s infinite;
        }
        .step-dot.skip {
            background: rgba(255, 255, 255, 0.05);
            border-style: dashed;
            color: #666;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(200, 160, 30, 0.3);
            }
            50% {
                box-shadow: 0 0 14px rgba(200, 160, 30, 0.7);
            }
        }
        .court-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 6px 2px;
            flex-wrap: nowrap;
            align-items: flex-start;
            min-height: 110px;
        }
        .court-card {
            flex-shrink: 0;
            width: 78px;
            aspect-ratio: 2/3;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--card-bg);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }
        .court-card:hover {
            border-color: var(--gold2);
        }
        .court-card.used {
            opacity: 0.5;
            border-style: dashed;
        }
        .court-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .court-card .used-ov {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #888;
            z-index: 3;
            pointer-events: none;
        }
        .court-card .card-nr {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 0.5rem;
            background: rgba(0, 0, 0, 0.75);
            color: var(--gold2);
            border-radius: 2px;
            padding: 1px 3px;
            z-index: 2;
        }
        .court-empty {
            font-size: 0.78rem;
            color: var(--text3);
            padding: 30px 0;
            text-align: center;
        }
        .event-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .event-card {
            width: 72px;
            aspect-ratio: 2/3;
            border: 1.5px solid rgba(180, 50, 30, 0.5);
            border-radius: 6px;
            background: var(--card-bg);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .event-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .event-card .del-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.75);
            border: none;
            color: #f06040;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }
        .event-card .evt-name {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 0.45rem;
            background: rgba(0, 0, 0, 0.8);
            color: #e0a090;
            text-align: center;
            padding: 1px 2px;
            z-index: 2;
            line-height: 1.1;
        }
        .input-num {
            padding: 7px 8px;
            width: 72px;
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: 6px;
            text-align: center;
        }
        .zoom-ov {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 9999;
            padding: 10px;
            flex-wrap: wrap;
        }
        .zoom-ov.on {
            display: flex;
        }
        .zoom-ov img {
            max-width: min(300px, 42vw);
            max-height: 76vh;
            border-radius: 7px;
            border: 2px solid var(--gold2);
            object-fit: contain;
        }
        .zclose {
            position: fixed;
            top: 12px;
            right: 14px;
            background: none;
            border: 1px solid #777;
            color: #ccc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--panel);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 9px 16px;
            border-radius: 7px;
            font-size: 0.78rem;
            z-index: 9998;
            transition: transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }
        .toast.on {
            transform: translateX(-50%) translateY(0);
        }
        .rules-block {
            font-size: 0.73rem;
            color: var(--text2);
            line-height: 1.5;
        }
        .rules-block h4 {
            color: var(--gold2);
            font-size: 0.78rem;
            margin: 8px 0 3px;
        }
        .rules-block ul {
            padding-left: 16px;
        }
        .rules-block li {
            margin-bottom: 1px;
        }
        summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--text2);
            font-size: 0.8rem;
            padding: 6px 0;
        }
        .pill-row {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }
        .pill {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid;
            font-weight: 600;
            white-space: nowrap;
        }
        .pill.rT {
            background: #04342c;
            border-color: #1d9e75;
            color: #9fe1cb;
        }
        .pill.rK {
            background: #042c53;
            border-color: #378add;
            color: #b5d4f4;
        }
        .pill.rKa {
            background: #4a1b0c;
            border-color: #d85a30;
            color: #f0997b;
        }
        .pill.rPu {
            background: #412402;
            border-color: #ba7517;
            color: #fac775;
        }
        .pill.rH {
            background: #173404;
            border-color: #639922;
            color: #c0dd97;
        }
        .pill.rP {
            background: #26215c;
            border-color: #7f77dd;
            color: #cecbf6;
        }
        .placement-box {
            background: rgba(40, 100, 180, 0.1);
            border: 1px solid rgba(40, 100, 180, 0.35);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.78rem;
            color: #b0c8e8;
            line-height: 1.5;
            margin-top: 6px;
        }
        .placement-box strong {
            color: #80b0f0;
        }
    </style>
</head>
<body>

    <div class="screen active" id="scrSetup">
        <h1>✦ WAKHAN KI ✦</h1>
        <p class="sub">Pax Pamir 2. Edition – Solo &amp; Duo</p>
        <div class="divider"></div>
        <div class="card" id="setupCard">
            <h2>🎯 Spielaufbau</h2>
            <div id="setupContent"></div>
        </div>
    </div>

    <div class="screen" id="scrGame">
        <div class="row spread" style="flex-wrap:wrap;gap:6px;">
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
                <span class="info-tag tag-wak" id="wakLoyTag">–</span>
                <span class="info-tag tag-suit" id="prefSuitTag">–</span>
            </div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;" id="playerTags"></div>
        </div>
        <h1>✦ WAKHAN KI ✦</h1>
        <div class="divider"></div>

        <div class="stage-row">
            <div class="slot">
                <div class="slot-lbl">KI-Stapel</div>
                <div class="frame" id="fStack" onclick="window._zoomStack()">
                    <div class="loading-ring" id="ringStack"></div>
                    <img id="imgStack" alt="">
                    <div class="ph" id="phStack">leer</div>
                    <div class="cnt-stack" id="cntStack">0</div>
                </div>
            </div>
            <div class="plus-sep">→</div>
            <div class="slot">
                <div class="slot-lbl">Gezogene KI-Karte</div>
                <div class="frame hl" id="fCur" onclick="window._zoomCur()">
                    <div class="loading-ring" id="ringCur"></div>
                    <img id="imgCur" alt="">
                    <div class="ph" id="phCur">Karte ziehen</div>
                    <div class="arr-tag" id="arrCur"></div>
                    <div class="badge-nr" id="badgeCur"></div>
                </div>
            </div>
        </div>

        <div class="pill-row" id="priorityPills" style="display:none;"></div>

        <button class="btn-gold" id="btnStartTurn" onclick="window._startTurn()">▶ Wakhans Zug beginnen</button>

        <div class="card" id="actionCard" style="display:none;">
            <h2>⚡ Aktion <span id="actNum">1</span> von 2</h2>
            <div class="step-dots" id="stepDots"></div>
            <div class="action-box" id="actionBox"></div>
            <div id="actionExtra" style="font-size:.74rem;color:#80b0d0;margin-top:4px;"></div>
            <div class="row" style="gap:6px;margin-top:8px;">
                <button class="btn-outline" id="btnDo" onclick="window._resolveAction(true)">✓ Ausführen</button>
                <button class="btn-ghost" id="btnSkip" onclick="window._resolveAction(false)">✗ Überspringen</button>
            </div>
        </div>

        <div class="card" id="radCard" style="display:none;">
            <h2>🌀 Radikalisierung</h2>
            <div id="radContent"></div>
        </div>

        <div class="card" id="bonusCard" style="display:none;">
            <h2>🌟 Bonusaktionen</h2>
            <div id="bonusBody"></div>
            <button class="btn-gold" style="margin-top:6px;" onclick="window._finishBonuses()">✓ Zug abschließen</button>
        </div>

        <div class="card" id="verwCard" style="display:none;">
            <h2>⚙ Verwaltungsphase</h2>
            <div id="verwBody"></div>
        </div>

        <div class="card">
            <h2>⚔ Wakhans Hof <span style="font-size:.7rem;color:var(--text3);" id="courtCnt">(0)</span></h2>
            <div class="court-row" id="courtRow">
                <div class="court-empty">Noch keine Hofkarten.</div>
            </div>
            <div class="row" style="margin-top:6px;gap:5px;">
                <input type="number" class="input-num" id="courtIn" min="1" max="100" placeholder="Nr. 1–100">
                <button class="btn-sm btn-outline" onclick="window._addCourtManual()">+ Karte</button>
                <button class="btn-sm btn-danger" onclick="window._clearCourt()">Leeren</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 Ereigniskarten <span style="font-size:.7rem;color:var(--text3);" id="eventCnt">(0)</span></h2>
            <div class="event-row" id="eventRow">
                <span style="font-size:.72rem;color:var(--text3);">Keine.</span>
            </div>
            <div class="row" style="margin-top:4px;gap:5px;">
                <input type="number" class="input-num" id="eventIn" min="101" max="116" placeholder="Nr. 101–116">
                <button class="btn-sm btn-outline" onclick="window._addEvent()">+ Ereignis</button>
            </div>
        </div>

        <details style="margin-top:4px;">
            <summary>📜 Regelreferenz</summary>
            <div class="rules-block" id="rulesContent"></div>
        </details>
        <button class="btn-ghost btn-sm" style="margin-top:4px;" onclick="window._resetGame()">↺ Neues Spiel</button>
    </div>

    <div class="zoom-ov" id="zoom" onclick="window._closeZoom()">
        <button class="zclose" onclick="window._closeZoom()">✕</button>
        <div><img id="zimg" src="" alt=""><div style="font-size:.68rem;color:#aaa;text-align:center;" id="zlbl"></div></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const REGION_NAMES = ['Transkaspien', 'Kabul', 'Kandahar', 'Punjab', 'Herat', 'Persien'];
            const REGION_CLASSES = ['rT', 'rK', 'rKa', 'rPu', 'rH', 'rP'];
            const REGION_BY_IDX = {};
            for (let i = 0; i < 6; i++) REGION_BY_IDX[i] = { n: REGION_NAMES[i], c: REGION_CLASSES[i] };

            const blobCache = {};
            async function tryFetch(u) { if (blobCache[u]) return blobCache[u]; const r = await fetch(u, { mode: 'cors', cache: 'force-cache' }); if (!r.ok) throw 0; const b = await r.blob(); if (!b.type.startsWith('image/')) throw 0; const o = URL.createObjectURL(b); blobCache[u] = o; return o; }
            async function tryImgSrc(u) { return new Promise((r, j) => { const i = new Image();
                i.crossOrigin = 'anonymous';
                i.onload = () => r(u);

                i.src = u; }); }
            async function loadImg(el, fns, id) { el.style.display = 'none'; for (const f of fns) { const u = f(id); try { const s = await tryFetch(u);
                    el.src = s;

                            'mostForeignSpies' ? verwCandidates.filter(c => spyIds.includes(c.id)) : verwCandidates

                verwAbwurfIdx = mode === 'mostForeignSpies' ? 4 : 5;
                document.getElementById('abwurfProgress').innerHTML +=
                    '<p style="font-size:.7rem;color:var(--text3);">→ Spion-Prüfung abgeschlossen (' + verwCandidates.length +
                    ' Kandidaten).</p>';
                processAbwurfStep(needed);
            }

            function showAbwurfResult(needed) {
                const toDiscard = verwCandidates.slice(0, needed);
                let html = '<p><strong>Vorschlag zum Abwerfen:</strong></p>';
                toDiscard.forEach(c => { const info = CD[c.id];
                    html +=
                        '<div style="background:rgba(200,60,40,.1);border:1px solid rgba(200,60,40,.3);border-radius:6px;padding:6px 8px;margin:3px 0;font-size:.78rem;"><strong>#' +
                        c.id + ' – ' + (info ? info.name : '?') + '</strong> (' + (info ? info.suit : '?') + ', R' + (info ?
                            info.rank : '?') +
                        ') <button class="btn-sm btn-danger" style="padding:3px 8px;font-size:.7rem;" onclick="window._discardCourtCard(' +
                        c.id + ')">✕ Abwerfen</button></div>'; });
                html +=
                    '<p style="font-size:.7rem;color:var(--text3);margin-top:4px;">Wirf die vorgeschlagenen Karten ab oder wähle manuell im Hof.</p><button class="btn-gold" style="margin-top:6px;" onclick="window._finishVerwaltung()">✓ Verwaltung erledigt</button>';
                document.getElementById('verwBody').innerHTML = html;
            }
            window._discardCourtCard = function(id) { const idx = court.findIndex(c => c.id === id); if (idx >= 0) { court
                    .splice(idx, 1);
                    updateCourtUI();
                    toast('Karte #' + id + ' abgeworfen.'); } if (court.length <= courtLimit) { document.getElementById(
                    'verwBody').innerHTML += '<p style="color:#80d080;">✅ Hof jetzt im Limit!</p>'; } };
            window._finishVerwaltung = function() {
                turnActive = false;
                document.getElementById('btnStartTurn').disabled = false;
                hideAllPanels();
                court.forEach(c => c.usedThisTurn = false);
                updateCourtUI();
                clearCurUI();
                document.getElementById('priorityPills').style.display = 'none';
                toast('✅ Wakhans Zug abgeschlossen.');
                showScreen('scrGame');
            };

            document.getElementById('rulesContent').innerHTML = `
            <h4>Pragmatische Loyalität</h4><p>Erste Koalition in der Loyalitätsreihe der KI-Karte, die <em>kein</em> menschlicher Spieler besitzt.</p>
            <h4>Kartenpriorität</h4><ul><li>Karte eines Mitspielers</li><li>Bevorzugte Farbe</li><li>Patriot des dominanten Bündnisses</li><li>Beute des dom. Bündnisses</li><li>Anderer Patriot</li><li>Fremdfinanziert</li><li>Höchster Rang</li><li>Höchste Nr.</li></ul>
            <h4>Abwerfpriorität</h4><ul><li>Nicht-Politik</li><li>Kein Patriot</li><li>Nicht-fremdfinanziert</li><li>Meiste fremde Spione</li><li>Wenigste Spione</li><li>Niedrigster Rang</li><li>Nicht bevorzugte Farbe</li><li>Niedrigste Nr.</li></ul>
            <h4>Kampf</h4><p>Region mit ≥1 Armee + feindlichen Einheiten. Zerstörung: Stämme → Armeen → Straßen.</p>
            <h4>Steuern</h4><p>Spieler vor Marktkarten. Meiste Rupien zuerst. Gleichstand → roter Pfeil.</p>
            <h4>Marschieren</h4><p>Nur Armeen, keine Straßen nötig. In Regionen mit feindlichen Stämmen.</p>
            <h4>Bauen</h4><p>Region am weitesten links auf KI-Karte mit Wakhan-Vorherrschaft.</p>`;

            // Globale Funktionen exponieren
            window._zoomStack = zoomStack;
            window._zoomCur = zoomCur;
            window._closeZoom = closeZoom;
            window._addCourtManual = addCourtManual;
            window._clearCourt = clearCourt;
            window._addEvent = addEvent;
            window._startTurn = window._startTurn;
            window._resolveAction = window._resolveAction;
            window._finishBonuses = window._finishBonuses;
            window._radDomInMarket = window._radDomInMarket;
            window._radDomWins = window._radDomWins;
            window._radCardPicked = window._radCardPicked;
            window._radSetBriber = window._radSetBriber;
            window._radCalcBribe = window._radCalcBribe;
            window._radFinish = window._radFinish;
            window._discardCourtCard = window._discardCourtCard;
            window._finishVerwaltung = window._finishVerwaltung;
            window._resetGame = window._resetGame;
            window._setupPickCount = window._setupPickCount;
            window._setupPickLoy = window._setupPickLoy;
            window._finishSetup = window._finishSetup;

            renderSetup();
            document.addEventListener('keydown', e => { if (e.key === 'Escape') closeZoom(); });
            updateTopBar();
        })();
    </script>
</body>
</html>
