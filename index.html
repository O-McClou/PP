<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wakhan KI – Pax Pamir 2</title>
    <style>
        :root {
            --bg: #0d0a04;
            --panel: #1a1208;
            --card-bg: #121008;
            --gold: #c9a030;
            --gold2: #d4a017;
            --text: #e8d5a0;
            --text2: #a08858;
            --text3: #6b6040;
            --border: rgba(180, 130, 30, 0.3);
            --border2: rgba(180, 130, 30, 0.55);
            --brit: #4a8fd4;
            --rus: #c04040;
            --afg: #3a9a3a;
            --rad: #d07040;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 56px;
            font-size: 17px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        .screen {
            width: 100%;
            max-width: 480px;
            padding: 16px 12px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .screen.active {
            display: flex;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--gold2);
            text-align: center;
            letter-spacing: 0.06em;
            font-weight: 700;
        }
        .sub {
            font-size: 0.8rem;
            color: var(--text3);
            text-align: center;
            font-style: italic;
            margin-top: -6px;
        }
        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 14px;
        }
        .card h2 {
            font-size: 1rem;
            color: var(--gold2);
            margin-bottom: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hl {
            color: #f0d060;
            font-weight: 600;
        }
        .warn {
            color: #e08070;
            font-weight: 600;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row.ctr {
            justify-content: center;
        }
        .row.spread {
            justify-content: space-between;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            transition: all 0.15s;
            font-size: 0.95rem;
            padding: 0.7em 1.2em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.8;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f0d070, var(--gold2));
            color: #1a1000;
            box-shadow: 0 3px 12px rgba(180, 130, 20, 0.3);
            font-size: 1rem;
            padding: 0.9em 1.4em;
            width: 100%;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border2);
            color: var(--text);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text2);
        }
        .btn-sm {
            padding: 0.45em 0.9em;
            font-size: 0.8rem;
        }
        .btn-danger {
            background: transparent;
            border: 1px solid rgba(200, 60, 40, 0.5);
            color: #d08070;
        }
        .btn-full {
            width: 100%;
        }
        .loy-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .loy-pill {
            padding: 0.5em 1em;
            border-radius: 20px;
            border: 2px solid;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            transition: all 0.2s;
        }
        .loy-pill.brit {
            border-color: var(--brit);
            color: var(--brit);
        }
        .loy-pill.brit.sel {
            background: var(--brit);
            color: #fff;
        }
        .loy-pill.rus {
            border-color: var(--rus);
            color: var(--rus);
        }
        .loy-pill.rus.sel {
            background: var(--rus);
            color: #fff;
        }
        .loy-pill.afg {
            border-color: var(--afg);
            color: var(--afg);
        }
        .loy-pill.afg.sel {
            background: var(--afg);
            color: #fff;
        }
        .info-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
            margin: 1px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .tag-wak {
            background: rgba(200, 160, 30, 0.2);
            border: 1px solid var(--gold2);
            color: var(--gold2);
        }
        .tag-suit {
            background: rgba(160, 130, 180, 0.2);
            border: 1px solid #a080c0;
            color: #c0a0d0;
            position: relative;
        }
        .suit-picker {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--panel);
            border: 1px solid var(--border2);
            border-radius: 8px;
            flex-direction: column;
            gap: 4px;
            z-index: 50;
            min-width: 150px;
        }
        .suit-picker.show {
            display: flex;
        }
        .suit-picker button {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.8rem;
            padding: 6px 10px;
            text-align: left;
            width: 100%;
        }
        .stage-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: center;
        }
        .slot {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .slot-lbl {
            font-size: 0.65rem;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }
        .frame {
            width: 100%;
            aspect-ratio: 2/3;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .frame.hl {
            border-color: var(--gold2);
            box-shadow: 0 0 12px rgba(212, 160, 23, 0.2);
        }
        .frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .frame .ph {
            font-size: 0.75rem;
            color: var(--text3);
            text-align: center;
            padding: 8px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .arr-tag {
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 3px;
            padding: 2px 6px;
            display: none;
            z-index: 2;
        }
        .arr-tag.top {
            background: rgba(40, 160, 70, 0.85);
            color: #fff;
        }
        .arr-tag.bot {
            background: rgba(200, 70, 30, 0.85);
            color: #fff;
        }
        .badge-nr {
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 0.6rem;
            background: rgba(0, 0, 0, 0.75);
            color: var(--gold2);
            border-radius: 3px;
            padding: 2px 5px;
            display: none;
            z-index: 2;
        }
        .cnt-stack {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 0.6rem;
            background: rgba(0, 0, 0, 0.75);
            color: #aaa;
            border-radius: 3px;
            padding: 2px 5px;
            z-index: 2;
        }
        .action-box {
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .action-box.rad {
            border-left-color: var(--rad);
        }
        .step-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            border: 2px solid var(--border2);
            color: var(--text3);
            flex-shrink: 0;
        }
        .step-dot.done {
            background: rgba(180, 140, 30, 0.25);
            border-color: var(--gold2);
            color: var(--gold2);
        }
        .step-dot.act {
            background: rgba(200, 160, 30, 0.4);
            border-color: var(--gold2);
            color: #fff;
            box-shadow: 0 0 10px rgba(200, 160, 30, 0.5);
            animation: pulse 1.5s infinite;
        }
        .step-dot.skip {
            background: rgba(255, 255, 255, 0.05);
            border-style: dashed;
            color: #666;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(200, 160, 30, 0.3);
            }
            50% {
                box-shadow: 0 0 16px rgba(200, 160, 30, 0.7);
            }
        }
        .court-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 2px;
            flex-wrap: nowrap;
            align-items: flex-start;
            min-height: 120px;
        }
        .court-card {
            flex-shrink: 0;
            width: 86px;
            aspect-ratio: 2/3;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }
        .court-card:hover {
            border-color: var(--gold2);
        }
        .court-card.used {
            opacity: 0.5;
            border-style: dashed;
        }
        .court-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .court-card .used-ov {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #888;
            z-index: 3;
            pointer-events: none;
        }
        .court-card .card-nr {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 0.55rem;
            background: rgba(0, 0, 0, 0.8);
            color: var(--gold2);
            border-radius: 3px;
            padding: 2px 4px;
            z-index: 2;
        }
        .event-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .event-card {
            width: 80px;
            aspect-ratio: 2/3;
            border: 2px solid rgba(180, 50, 30, 0.5);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .event-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .event-card .del-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(0, 0, 0, 0.8);
            border: none;
            color: #f06040;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }
        .event-card .evt-name {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            font-size: 0.5rem;
            background: rgba(0, 0, 0, 0.85);
            color: #e0a090;
            text-align: center;
            padding: 2px 3px;
            z-index: 2;
            line-height: 1.2;
        }
        .input-num {
            padding: 0.6em 0.8em;
            min-width: 80px;
            font-family: inherit;
            font-size: 1rem;
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: 7px;
            text-align: center;
        }
        .zoom-ov {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 9999;
            padding: 12px;
            flex-wrap: wrap;
        }
        .zoom-ov.on {
            display: flex;
        }
        .zoom-ov img {
            max-width: min(320px, 44vw);
            max-height: 76vh;
            border-radius: 8px;
            border: 2px solid var(--gold2);
            object-fit: contain;
        }
        .zclose {
            position: fixed;
            top: 14px;
            right: 16px;
            background: none;
            border: 1px solid #777;
            color: #ccc;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--panel);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 9998;
            transition: transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }
        .toast.on {
            transform: translateX(-50%) translateY(0);
        }
        .rules-block {
            font-size: 0.8rem;
            color: var(--text2);
            line-height: 1.6;
        }
        .rules-block h4 {
            color: var(--gold2);
            font-size: 0.85rem;
            margin: 10px 0 4px;
        }
        .rules-block ul {
            padding-left: 20px;
        }
        .rules-block li {
            margin-bottom: 2px;
        }
        summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--text2);
            font-size: 0.85rem;
            padding: 8px 0;
        }
        .pill-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .pill {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid;
            font-weight: 600;
            white-space: nowrap;
        }
        .pill.rT {
            background: #04342c;
            border-color: #1d9e75;
            color: #9fe1cb;
        }
        .pill.rK {
            background: #042c53;
            border-color: #378add;
            color: #b5d4f4;
        }
        .pill.rKa {
            background: #4a1b0c;
            border-color: #d85a30;
            color: #f0997b;
        }
        .pill.rPu {
            background: #412402;
            border-color: #ba7517;
            color: #fac775;
        }
        .pill.rH {
            background: #173404;
            border-color: #639922;
            color: #c0dd97;
        }
        .pill.rP {
            background: #26215c;
            border-color: #7f77dd;
            color: #cecbf6;
        }
        .placement-box {
            background: rgba(40, 100, 180, 0.1);
            border: 1px solid rgba(40, 100, 180, 0.35);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.85rem;
            color: #b0c8e8;
            line-height: 1.6;
            margin-top: 8px;
        }
        .placement-box strong {
            color: #80b0f0;
        }
        .action-box.warn {
            border-left-color: #c04040;
            background: rgba(180, 30, 30, 0.1);
        }
        .bonus-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="screen active" id="scrSetup">
        <h1>✦ WAKHAN KI ✦</h1>
        <p class="sub">Pax Pamir 2. Edition – Solo &amp; Duo</p>
        <div class="divider"></div>
        <div class="card" id="setupCard">
            <h2>🎯 Spielaufbau</h2>
            <div id="setupContent"></div>
        </div>
    </div>

    <div class="screen" id="scrGame">
        <div class="row spread" style="flex-wrap:wrap;gap:8px;">
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
                <span class="info-tag tag-wak" id="wakLoyTag">–</span>
                <span class="info-tag tag-suit" id="prefSuitTag" onclick="toggleSuitPicker()">–</span>
                <div class="suit-picker" id="suitPicker">
                    <button onclick="setPreferredSuit('Politik')">Politik</button>
                    <button onclick="setPreferredSuit('Wirtschaft')">Wirtschaft</button>
                    <button onclick="setPreferredSuit('Militär')">Militär</button>
                    <button onclick="setPreferredSuit('Geheimdienst')">Geheimdienst</button>
                </div>
            </div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;" id="playerTags"></div>
        </div>
        <h1>✦ WAKHAN KI ✦</h1>
        <div class="divider"></div>

        <div class="stage-row">
            <div class="slot">
                <div class="slot-lbl">KI-Stapel</div>
                <div class="frame" id="fStack" onclick="window._zoomStack()">
                    <div class="loading-ring" id="ringStack" style="display:none;"></div>
                    <img id="imgStack" alt="">
                    <div class="ph" id="phStack">leer</div>
                    <div class="cnt-stack" id="cntStack">0</div>
                </div>
            </div>
            <div class="plus-sep" style="padding-top:45px;">→</div>
            <div class="slot">
                <div class="slot-lbl">Gezogene KI-Karte</div>
                <div class="frame hl" id="fCur" onclick="window._zoomCur()">
                    <div class="loading-ring" id="ringCur" style="display:none;"></div>
                    <img id="imgCur" alt="">
                    <div class="ph" id="phCur">Karte ziehen</div>
                    <div class="arr-tag" id="arrCur"></div>
                    <div class="badge-nr" id="badgeCur"></div>
                </div>
            </div>
        </div>

        <div class="pill-row" id="priorityPills" style="display:none;"></div>

        <button class="btn-gold" id="btnStartTurn" onclick="window._startTurn()">▶ Wakhans Zug beginnen</button>

        <div class="card" id="actionCard" style="display:none;">
            <h2>⚡ Aktion <span id="actNum">1</span> von 2</h2>
            <div class="step-dots" id="stepDots"></div>
            <div class="action-box" id="actionBox"></div>
            <div id="actionExtra" style="font-size:.8rem;color:#80b0d0;margin-top:5px;"></div>
            <div class="bonus-row" style="margin-top:8px; display:none;" id="bonusCheckRow">
                <input type="checkbox" id="bonusChk">
                <label for="bonusChk">Bonusaktion (bevorzugte Farbe)</label>
            </div>
            <div class="row" style="gap:8px;margin-top:10px;">
                <button class="btn-outline" id="btnDo" onclick="window._resolveAction(true)">✓ Ausführen</button>
                <button class="btn-ghost" id="btnSkip" onclick="window._resolveAction(false)">✗ Überspringen</button>
            </div>
        </div>

        <div class="card" id="radCard" style="display:none;">
            <h2>🌀 Radikalisierung</h2>
            <div id="radContent"></div>
        </div>

        <div class="card" id="bonusCard" style="display:none;">
            <h2>🌟 Bonusaktionen</h2>
            <div id="bonusBody"></div>
            <button class="btn-gold" style="margin-top:8px;" onclick="window._finishBonuses()">✓ Zug abschließen</button>
        </div>

        <div class="card" id="verwCard" style="display:none;">
            <h2>⚙ Verwaltungsphase</h2>
            <div id="verwBody"></div>
        </div>

        <div class="card">
            <h2>⚔ Wakhans Hof <span style="font-size:.8rem;color:var(--text3);" id="courtCnt">(0)</span></h2>
            <div class="court-row" id="courtRow"><div class="court-empty">Noch keine Hofkarten.</div></div>
            <div class="row" style="margin-top:8px;gap:8px;">
                <input type="number" class="input-num" id="courtIn" min="1" max="100" placeholder="Nr. 1–100">
                <button class="btn-sm btn-outline" onclick="window._addCourtManual()">+ Karte</button>
                <button class="btn-sm btn-danger" onclick="window._clearCourt()">Leeren</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 Ereigniskarten <span style="font-size:.8rem;color:var(--text3);" id="eventCnt">(0)</span></h2>
            <div class="event-row" id="eventRow"><span style="font-size:.8rem;color:var(--text3);">Keine.</span></div>
            <div class="row" style="margin-top:6px;gap:8px;">
                <input type="number" class="input-num" id="eventIn" min="101" max="116" placeholder="Nr. 101–116">
                <button class="btn-sm btn-outline" onclick="window._addEvent()">+ Ereignis</button>
            </div>
        </div>

        <details style="margin-top:6px;">
            <summary>📜 Regelreferenz</summary>
            <div class="rules-block" id="rulesContent"></div>
        </details>
        <button class="btn-ghost btn-sm" style="margin-top:6px;" onclick="window._resetGame()">↺ Neues Spiel</button>
    </div>

            function initGame(){

            function hideAllPanels(){['actionCard','radCard','bonusCard','verwCard'].forEach(id=>document.getElementById(id).style.display='none');}

            function actionLabel(txt){const t=txt.toLowerCase();if(t.includes('radikalis'))return'rad';if(t.includes('kampf')||t.includes('kämpfe'))return'bat';if(t.includes('bauen'))return'bau';if(t.includes('besteuerung')||t.includes('steuern'))return'tax';if(t.includes('bewegen')||t.includes('marschieren'))return'mar';if(t.includes('verrat'))return'ver';if(t.includes('geschenk'))return'ges';return'';}
            function getCourtCardsWithAction(actionType){return court.filter(c=>{if(c.usedThisTurn)return false;const info=CD[c.id];return info&&info.actions&&info.actions.includes(actionType);});}
            function canWakhanPerformAction(actionText){const lbl=actionLabel(actionText);if(lbl==='rad')return true;if(!lbl){const t=actionText.toLowerCase();if(t.includes('keine karte')||t.includes('weniger als')||t.includes('hofgröße')||t.includes('bevorzugt werden')||t.includes('dominanz hat')||t.includes('koalition')||t.includes('weniger spione')||t.includes('kontrolle'))return'conditional';return true;}const matching=getCourtCardsWithAction(lbl);if(matching.length===0){const any=court.some(c=>!c.usedThisTurn&&CD[c.id]&&CD[c.id].actions&&CD[c.id].actions.includes(lbl));if(!any)return false;return'conditional';}return true;}
            function getBestCourtCardForAction(actionText){const lbl=actionLabel(actionText);if(!lbl||lbl==='rad')return null;const candidates=getCourtCardsWithAction(lbl);if(candidates.length===0)return null;const ranked=candidates.map(c=>{const info=CD[c.id];return{entry:c,info,priority:info?(info.suit===preferredSuit?0:(info.patriot?1:(info.prize?2:(info.rank||3)))):9};});ranked.sort((a,b)=>{if(a.priority!==b.priority)return a.priority-b.priority;if(a.info&&b.info&&a.info.rank!==b.info.rank)return(b.info.rank||0)-(a.info.rank||0);return(b.info?b.info.id||0:0)-(a.info?a.info.id||0:0);});return ranked[0]||null;}

                topDeck=pile.length>0?(WKC_BY_ID[pile[pile.length-1]]||null):null;

            function updateActionPanel(){
                if(!cur)return;
                const acts=[cur.action1_de,cur.action2_de,cur.action3_de];

                    advanceAction();
                    return;

                const lbl=actionLabel(currentText);
                document.getElementById('actNum').textContent=aDone+1;
                const dotsEl=document.getElementById('stepDots');dotsEl.innerHTML='';
                acts.forEach((_,i)=>{const d=document.createElement('div');d.className='step-dot';d.textContent=i+1;if(i<aIdx)d.className+=aSkips[i]?' skip':' done';else if(i===aIdx)d.className+=' act';dotsEl.appendChild(d);});
                let boxClass='action-box';let boxHtml='';
                if(lbl==='rad'){boxClass+=' rad';boxHtml+='<span style="color:#f0804a;font-weight:700;">🌀 RADIKALISIERUNG</span><br>';}
                boxHtml+=currentText;
                if(canDo==='conditional'){
                    document.getElementById('btnDo').style.display='';document.getElementById('btnSkip').textContent='✗ Überspringen';
                    document.getElementById('actionExtra').textContent='ℹ Bedingungen am Brett prüfen.';
                }else{
                    document.getElementById('btnDo').style.display='';document.getElementById('btnSkip').textContent='✗ Überspringen';
                    const best=getBestCourtCardForAction(currentText);
                    if(best&&best.info&&lbl!=='rad')document.getElementById('actionExtra').innerHTML='✅ Empfohlen: <strong>#'+best.info.id+' – '+best.info.name+'</strong> ('+best.info.suit+', R'+best.info.rank+')';
                    else document.getElementById('actionExtra').textContent='';
                }
                document.getElementById('actionBox').innerHTML=boxHtml;document.getElementById('actionBox').className=boxClass;
                document.getElementById('bonusCheckRow').style.display = (lbl==='rad')?'none':'flex';
                document.getElementById('bonusChk').checked = false;
                document.getElementById('actionCard').style.display='block';
            }

            window._resolveAction=function(exec){
                if(!cur)return;
                const txt=[cur.action1_de,cur.action2_de,cur.action3_de][aIdx];
                const canDo=canWakhanPerformAction(txt);
                if(exec&&canDo===false)exec=false;
                if(exec){
                    const isRad=txt.toLowerCase().includes('radikalis');
                    if(isRad){openRadWiz(txt);return;}
                    if(canDo==='conditional'&&!confirm('Sind alle Brett-Bedingungen erfüllt?\n\n'+txt+'\n\nOK = Ja, ausführen\nAbbrechen = Nein, überspringen')){aSkips[aIdx]=true;advanceAction();return;}
                    const isBonus = document.getElementById('bonusChk').checked;
                    if(!isBonus) aDone++;
                    aSkips[aIdx]=false;markBestCardAsUsed(txt);
                }else{aSkips[aIdx]=true;}
                advanceAction();
            };
            function markBestCardAsUsed(actionText){const lbl=actionLabel(actionText);if(!lbl||lbl==='rad')return;const best=getBestCourtCardForAction(actionText);if(best&&best.entry){const idx=court.findIndex(cc=>cc.id===best.entry.id&&!cc.usedThisTurn);if(idx>=0){court[idx].usedThisTurn=true;updateCourtUI();}}}
            function advanceAction(){
                aIdx++;
                if(aIdx>=3||aDone>=2){
                    if(aDone<2&&aIdx>=3){aIdx=0;updateActionPanel();return;}
                    finishStandardActions();return;
                }
                updateActionPanel();
            }
            function finishStandardActions(){document.getElementById('actionCard').style.display='none';document.getElementById('radCard').style.display='none';showBonusPhase();}

            function getMarketInstruction(){
                if(!cur||!topDeck)return{row:'?',col:'?',colIdx:-1};
                const redLabel=cur.redArrow==='top'?'OBEN':'UNTEN';
                const colIdx=cur.blackArrow>=1&&cur.blackArrow<=6?topDeck.backArray[cur.blackArrow]:-1;
                const colDisplay=colIdx>=0?colIdx:'?';
                return{row:redLabel,col:colDisplay,colIdx:colIdx};
            }
            function openRadWiz(actionText){radCardId=null;radBriber=null;document.getElementById('radCard').style.display='block';document.getElementById('radContent').innerHTML='';showRadStep('start');}
            function showRadStep(step,data){
                const el=document.getElementById('radContent');
                if(step==='start'){
                    const instr=getMarketInstruction();
                    el.innerHTML='<p style="font-size:1rem;">🌀 <strong>Radikalisierung:</strong> Wakhan kauft eine Karte vom Markt und spielt sie aus.</p>'
                    +'<ul style="font-size:.85rem;padding-left:20px;margin:8px 0;">'
                    +'<li>📍 <strong>Reihe:</strong> '+instr.row+'</li>'
                    +'<li>🔢 <strong>Spalte:</strong> '+instr.col+' (0 = ganz rechts)</li>'
                    +'<li>➡️ Falls nicht verfügbar: nächste Karte links. Reihe leer → andere Reihe, gleiche Spalte.</li>'
                    +'</ul>'
                    +'<p style="font-size:.9rem;">Liegt eine <strong>Dominanzcheck-Ereigniskarte</strong> im Markt?</p>'
                    +'<div class="row" style="gap:8px;"><button class="btn-outline btn-sm" onclick="window._radDomInMarket(true)">Ja</button><button class="btn-ghost btn-sm" onclick="window._radDomInMarket(false)">Nein</button></div>';
                }else if(step==='domWins'){
                    el.innerHTML='<p>Würde Wakhan beim Dominanzcheck die <strong>meisten Siegpunkte</strong> bekommen?</p><div class="row" style="gap:8px;"><button class="btn-outline btn-sm" onclick="window._radDomWins(true)">Ja – Dom.-Karte kaufen</button><button class="btn-ghost btn-sm" onclick="window._radDomWins(false)">Nein – andere Karte</button></div>';
                }else if(step==='pickCard'){
                    el.innerHTML='<p>Welche Karte wurde gekauft? <strong>Nr. 1–116</strong>:</p><p style="font-size:.8rem;color:var(--text3);">'+(data||'')+'</p><div class="row" style="gap:8px;"><input type="number" class="input-num" id="radInput" min="1" max="116" placeholder="Nr."><button class="btn-outline btn-sm" onclick="window._radCardPicked()">Weiter →</button></div><button class="btn-ghost btn-sm btn-full" style="margin-top:6px;" onclick="window._radFinish(false)">Keine Karte verfügbar</button>';
                }else if(step==='bribe'){
                    const info=radCardId?CD[radCardId]:null;const name=info?info.name:'Karte #'+radCardId;const region=info&&info.region?info.region:'?';
                    let btns='<button class="btn-outline btn-sm" onclick="window._radSetBriber(\'nobody\')">Niemand / Wakhan</button><button class="btn-outline btn-sm" onclick="window._radSetBriber(\'p1\')">Spieler 1</button>';
                    if(playerCount===2)btns+='<button class="btn-outline btn-sm" onclick="window._radSetBriber(\'p2\')">Spieler 2</button>';
                    el.innerHTML='<p>Wer <strong>beherrscht die Region</strong> von <strong>'+name+'</strong> (#'+radCardId+', Region: '+region+')?</p><div class="row" style="gap:8px;">'+btns+'</div>';
                }else if(step==='bribeAmount'){
                    el.innerHTML='<p>Wie viele <strong>Stämme</strong> hat der Spieler in dieser Region?</p><div class="row" style="gap:8px;"><input type="number" class="input-num" id="bribeAmt" min="0" max="20" placeholder="Anzahl"><button class="btn-outline btn-sm" onclick="window._radCalcBribe()">Berechnen</button></div>';
                }else if(step==='result'){
                    el.innerHTML=(data||'Radikalisierung abgeschlossen.')+'<button class="btn-gold" style="margin-top:10px;" onclick="window._radFinish(true)">✓ Aktion abgeschlossen</button>';
                }
            }
            window._radDomInMarket=function(yes){if(yes)showRadStep('domWins');else showRadStep('pickCard',getMarketInstruction().row+' Reihe, Spalte '+getMarketInstruction().col+'.');};
            window._radDomWins=function(yes){if(yes)showRadStep('pickCard','<strong>Dom.-Karte gekauft!</strong> Führe Dominanzcheck durch. Gib dann die Kartennummer ein (101–104).');else showRadStep('pickCard','Wähle: billigster Patriot der dom. Koalition, sonst billigste Karte mit meisten Armeen/Straßen, sonst billigste mit meisten Spionen/Stämmen.');};
            window._radCardPicked=function(){const v=parseInt(document.getElementById('radInput').value);if(isNaN(v)||v<1||v>116){toast('Bitte Nr. 1–116 eingeben.');return;}radCardId=v;if(v>100){radBriber='nobody';finalizeRad(0);return;}showRadStep('bribe');};
            window._radSetBriber=function(who){radBriber=who;if(who==='nobody')finalizeRad(0);else showRadStep('bribeAmount');};
            window._radCalcBribe=function(){const amt=parseInt(document.getElementById('bribeAmt').value);if(isNaN(amt)||amt<0){toast('Bitte Anzahl eingeben.');return;}finalizeRad(amt);};

            function getMarketSide(){if(!cur||!topDeck)return'R';const idx=cur.redArrow==='top'?0:7;const label=topDeck.backArray[idx].toLowerCase();return label.includes('left')?'L':'R';}
            function getRegionPriorities(){if(!topDeck)return[0,1,2,3,4,5];return topDeck.backArray.slice(1,7);}
            function buildPlacementInstructions(info){
                if(!info)return'';
                const pris=getRegionPriorities();
                const prioNames=pris.map(i=>REGION_BY_IDX[i]?REGION_BY_IDX[i].n:'?').join(' → ');
                let html='<div class="placement-box"><strong>📋 Platzierungsanweisungen:</strong><br><ul style="margin-top:6px;padding-left:20px;">';
                const spies=info.impactIcons?info.impactIcons.filter(i=>i==='spy').length:0;
                const armies=info.impactIcons?info.impactIcons.filter(i=>i==='army').length:0;
                const roads=info.impactIcons?info.impactIcons.filter(i=>i==='road').length:0;
                const tribes=info.impactIcons?info.impactIcons.filter(i=>i==='tribe').length:0;
                if(spies>0)html+='<li>🕵️ <strong>'+spies+' Spion(e):</strong> Auf Hofkarten der Region <em>'+info.region+'</em> mit höchster Kartenpriorität, wo Wakhan <strong>nicht</strong> die meisten Spione hat.</li>';
                if(roads>0)html+='<li>🛤️ <strong>'+roads+' Straße(n):</strong> An Grenzen gemäß Regionen-Priorität (siehe KI-Karte), beginnend bei Region <em>'+info.region+'</em>. Ungültige Grenzen überspringen.</li>';
                if(armies>0)html+='<li>⚔️ <strong>'+armies+' Armee(n):</strong> In der Kartenregion <em>'+info.region+'</em> platzieren (pragmatische Loyalität: <strong>'+wakLoy+'</strong>).</li>';
                if(tribes>0)html+='<li>🏘️ <strong>'+tribes+' Stamm/Stämme:</strong> In der Kartenregion <em>'+info.region+'</em> platzieren (pragmatische Loyalität: <strong>'+wakLoy+'</strong>).</li>';
                html+='</ul><p style="margin-top:6px;"><em>🌐 Regionen-Priorität (KI-Karte):</em> '+prioNames+'</p></div>';
                return html;
            }
            function finalizeRad(cost){
                const info=radCardId?CD[radCardId]:null;const isEvent=radCardId>100;const name=info?(isEvent?info.name:info.name):'Karte #'+radCardId;
                let result='';
                if(isEvent){
                    events.push(radCardId);updateEventUI();
                    result='<p><strong>Ereignis #'+radCardId+' – '+name+'</strong> gekauft!<br>Wurde <em>nicht</em> in den Hof gelegt.</p>';
                }else if(cost>rupien){
                    result='<p class="warn">Wakhan kann Bestechung (<strong>'+cost+' Rupien</strong>) nicht zahlen!<br>Karte wird <strong>abgeworfen</strong>.</p>';
                }else{
                    if(cost>0)rupien-=cost;
                    const side=getMarketSide();
                    if(!court.find(c=>c.id===radCardId)){if(side==='L')court.unshift({id:radCardId,usedThisTurn:true});else court.push({id:radCardId,usedThisTurn:true});}
                    result='<p>✅ <strong>'+name+'</strong> auf <strong>'+(side==='L'?'linke':'rechte')+'</strong> Hofseite gelegt.'+(cost>0?' Bestechung: '+cost+' Rupien.':'')+'</p>';
                    if(info&&info.impactIcons&&info.impactIcons.length>0)result+=buildPlacementInstructions(info);
                    if(info&&info.suitChange){preferredSuit=info.suitChange;result+='<p style="color:#f0d060;margin-top:6px;">🔄 Bevorzugte Farbe → <strong>'+info.suitChange+'</strong></p>';updateTopBar();}
                    updateCourtUI();
                }
                showRadStep('result',result);
            }
            window._radFinish=function(success){if(success&&radCardId){aDone++;aSkips[aIdx]=false;}else{aSkips[aIdx]=true;}document.getElementById('radCard').style.display='none';advanceAction();};

            function showBonusPhase(){
                hideAllPanels();
                const bonusCards=court.filter(c=>!c.usedThisTurn&&CD[c.id]&&CD[c.id].suit===preferredSuit);
                document.getElementById('bonusCard').style.display='block';
                const body=document.getElementById('bonusBody');
                if(bonusCards.length===0){body.innerHTML='<p>Keine unbenutzten Hofkarten der Farbe <strong>'+preferredSuit+'</strong>.</p>';}
                else{
                    let html='<p style="margin-bottom:8px;">Folgende Karten der Farbe <strong>'+preferredSuit+'</strong> sind noch <strong>unbenutzt</strong>:</p><ol style="padding-left:20px;font-size:.85rem;">';
                    bonusCards.forEach(c=>{const info=CD[c.id];if(!info)return;const firstAction=(info.actions&&info.actions.length>0)?info.actions[0]:'keine';
                        html+='<li style="margin-bottom:4px;"><strong>#'+c.id+' – '+info.name+'</strong> ('+info.suit+', R'+info.rank+') → '+firstAction+'</li>';});
                    html+='</ol><p style="font-size:.8rem;color:#aaa;margin-top:6px;">Führe die <strong>linke</strong> Aktion jeder Karte von <strong>links nach rechts</strong> aus.</p>';
                    body.innerHTML=html;
                }
                disc.push(cur.id);
            }
            window._finishBonuses=function(){document.getElementById('bonusCard').style.display='none';showVerwaltung();};

            function showVerwaltung(){
                hideAllPanels();verwAbwurfIdx=0;verwCandidates=[];
                const limit=getCourtLimit();const over=court.length-limit;
                document.getElementById('verwCard').style.display='block';
                if(over<=0){document.getElementById('verwBody').innerHTML='<p>Hofgröße: <strong>'+court.length+'/'+limit+'</strong> – im Rahmen.</p><p style="font-size:.8rem;color:var(--text3);">Handkarten: Wakhan hat keine.<br>Markt auffüllen: durch Mensch ausführen.</p><button class="btn-gold" style="margin-top:8px;" onclick="window._finishVerwaltung()">✓ Verwaltung erledigt</button>';return;}
                startAbwurfWizard(over);
            }
            function startAbwurfWizard(over){
                verwCandidates=[...court];verwAbwurfIdx=0;
                document.getElementById('verwBody').innerHTML='<p>⚠ Hof zu groß: <strong>'+court.length+'/'+getCourtLimit()+'</strong> – <strong>'+over+' Karte(n)</strong> abwerfen!</p><p style="font-size:.8rem;">Die App schlägt Karten nach Abwerfpriorität vor.</p><div id="abwurfProgress"></div>';
                processAbwurfStep(over);
            }
            function processAbwurfStep(needed){
                if(verwCandidates.length<=needed){showAbwurfResult(needed);return;}
                if(verwAbwurfIdx===0){const nonPolitik=verwCandidates.filter(c=>CD[c.id]&&CD[c.id].suit!=='Politik');if(nonPolitik.length>0&&verwCandidates.length-nonPolitik.length>=needed){verwCandidates=nonPolitik;verwAbwurfIdx++;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Nicht-Politik-Karten priorisiert ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);return;}}
                if(verwAbwurfIdx<=1){const noPatriot=verwCandidates.filter(c=>CD[c.id]&&!CD[c.id].patriot);if(noPatriot.length>0&&verwCandidates.length-noPatriot.length>=needed&&noPatriot.length<verwCandidates.length){verwCandidates=noPatriot;verwAbwurfIdx=2;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Kein-Patriot priorisiert ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);return;}}
                if(verwAbwurfIdx<=2){askDebtThenContinue(needed);return;}
                if(verwAbwurfIdx<=3){askSpyCountThenContinue(needed,'mostForeignSpies');return;}
                if(verwAbwurfIdx<=4){askSpyCountThenContinue(needed,'fewestSpies');return;}
                if(verwAbwurfIdx<=5){const lowestRank=Math.min(...verwCandidates.map(c=>CD[c.id]?(CD[c.id].rank||0):0));const lowRankCards=verwCandidates.filter(c=>(CD[c.id]?(CD[c.id].rank||0):0)===lowestRank);if(lowRankCards.length>0&&verwCandidates.length-lowRankCards.length>=needed){verwCandidates=lowRankCards;verwAbwurfIdx=6;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Niedrigster Rang priorisiert ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);return;}}
                if(verwAbwurfIdx<=6){const notPref=verwCandidates.filter(c=>CD[c.id]&&CD[c.id].suit!==preferredSuit);if(notPref.length>0&&verwCandidates.length-notPref.length>=needed){verwCandidates=notPref;verwAbwurfIdx=7;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Nicht bevorzugte Farbe priorisiert ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);return;}}
                verwCandidates.sort((a,b)=>(a.id||999)-(b.id||999));verwAbwurfIdx=8;
                document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Nach niedrigster Kartennummer sortiert.</p>';
                showAbwurfResult(needed);
            }
            function askDebtThenContinue(needed){
                const fremdIds=verwCandidates.map(c=>c.id).join(', ');
                if(confirm('Welche dieser Hofkarten sind <strong>fremdfinanziert</strong> (Schuldensymbol)?\n\nKarten: #'+fremdIds+'\n\nOK = Eingabe\nAbbrechen = Keine')){
                    const input=prompt('Gib die Kartennummern der fremdfinanzierten Karten ein (durch Komma getrennt):');if(input){const debtIds=input.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));const noDebt=verwCandidates.filter(c=>!debtIds.includes(c.id));if(noDebt.length>0&&verwCandidates.length-noDebt.length>=needed)verwCandidates=noDebt;}
                }
                verwAbwurfIdx=3;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Fremdfinanzierung geprüft ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);
            }
            function askSpyCountThenContinue(needed,mode){
                const candidateIds=verwCandidates.map(c=>c.id).join(', ');const label=mode==='mostForeignSpies'?'die <strong>meisten fremden Spione</strong> (mehr als Wakhan) haben':'die <strong>wenigsten Spione</strong> haben';
                if(confirm('Welche dieser Hofkarten '+label+'?\n\nKandidaten: #'+candidateIds+'\n\nOK = Eingabe\nAbbrechen = Keine Unterschiede')){
                    const input=prompt('Gib die Kartennummern ein (durch Komma getrennt):');if(input){const spyIds=input.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));const filtered=mode==='mostForeignSpies'?verwCandidates.filter(c=>spyIds.includes(c.id)):verwCandidates.filter(c=>!spyIds.includes(c.id));if(filtered.length>0&&verwCandidates.length-filtered.length>=needed)verwCandidates=filtered;}
                }
                verwAbwurfIdx=mode==='mostForeignSpies'?4:5;document.getElementById('abwurfProgress').innerHTML+='<p style="font-size:.75rem;color:var(--text3);">→ Spion-Prüfung abgeschlossen ('+verwCandidates.length+' Kandidaten).</p>';processAbwurfStep(needed);
            }
            function showAbwurfResult(needed){
                const toDiscard=verwCandidates.slice(0,needed);
                let html='<p><strong>Vorschlag zum Abwerfen:</strong></p>';
                toDiscard.forEach(c=>{const info=CD[c.id];html+='<div style="background:rgba(200,60,40,.1);border:1px solid rgba(200,60,40,.3);border-radius:6px;padding:8px;margin:4px 0;font-size:.85rem;"><strong>#'+c.id+' – '+(info?info.name:'?')+'</strong> ('+(info?info.suit:'?')+', R'+(info?info.rank:'?')+') <button class="btn-sm btn-danger" style="padding:4px 10px;font-size:.8rem;" onclick="window._discardCourtCard('+c.id+')">✕ Abwerfen</button></div>';});
                html+='<p style="font-size:.8rem;color:var(--text3);margin-top:6px;">Wirf die vorgeschlagenen Karten ab oder wähle manuell im Hof.</p><button class="btn-gold" style="margin-top:8px;" onclick="window._finishVerwaltung()">✓ Verwaltung erledigt</button>';
                document.getElementById('verwBody').innerHTML=html;
            }
            window._discardCourtCard=function(id){const idx=court.findIndex(c=>c.id===id);if(idx>=0){court.splice(idx,1);updateCourtUI();toast('Karte #'+id+' abgeworfen.');}if(court.length<=getCourtLimit()){document.getElementById('verwBody').innerHTML+='<p style="color:#80d080;">✅ Hof jetzt im Limit!</p>';}};
            window._finishVerwaltung=function(){
                turnActive=false;document.getElementById('btnStartTurn').disabled=false;hideAllPanels();
                court.forEach(c=>c.usedThisTurn=false);updateCourtUI();clearCurUI();
                document.getElementById('priorityPills').style.display='none';toast('✅ Wakhans Zug abgeschlossen.');showScreen('scrGame');
            };

            document.getElementById('rulesContent').innerHTML=`<h4>Pragmatische Loyalität</h4><p>Erste Koalition in der Loyalitätsreihe der KI-Karte, die <em>kein</em> menschlicher Spieler besitzt.</p><h4>Kartenpriorität</h4><ul><li>Karte eines Mitspielers</li><li>Bevorzugte Farbe</li><li>Patriot des dominanten Bündnisses</li><li>Beute des dom. Bündnisses</li><li>Anderer Patriot</li><li>Fremdfinanziert</li><li>Höchster Rang</li><li>Höchste Nr.</li></ul><h4>Abwerfpriorität</h4><ul><li>Nicht-Politik</li><li>Kein Patriot</li><li>Nicht-fremdfinanziert</li><li>Meiste fremde Spione</li><li>Wenigste Spione</li><li>Niedrigster Rang</li><li>Nicht bevorzugte Farbe</li><li>Niedrigste Nr.</li></ul><h4>Kampf</h4><p>Region mit ≥1 Armee + feindlichen Einheiten. Zerstörung: Stämme → Armeen → Straßen.</p><h4>Steuern</h4><p>Spieler vor Marktkarten. Meiste Rupien zuerst. Gleichstand → roter Pfeil.</p><h4>Marschieren</h4><p>Nur Armeen, keine Straßen nötig. In Regionen mit feindlichen Stämmen.</p><h4>Bauen</h4><p>Region am weitesten links auf KI-Karte mit Wakhan-Vorherrschaft.</p>`;

            window._addCourtManual=addCourtManual;window._clearCourt=clearCourt;window._addEvent=addEvent;
            window._startTurn=window._startTurn;window._resolveAction=window._resolveAction;window._finishBonuses=window._finishBonuses;
            window._radDomInMarket=window._radDomInMarket;window._radDomWins=window._radDomWins;window._radCardPicked=window._radCardPicked;
            window._radSetBriber=window._radSetBriber;window._radCalcBribe=window._radCalcBribe;window._radFinish=window._radFinish;
            window._discardCourtCard=window._discardCourtCard;window._finishVerwaltung=window._finishVerwaltung;
            window._resetGame=window._resetGame;window._setupPickCount=window._setupPickCount;window._setupPickLoy=window._setupPickLoy;
            window._finishSetup=window._finishSetup;

            renderSetup();
            document.addEventListener('keydown',e=>{if(e.key==='Escape')window._closeZoom();});
            updateTopBar();
        })();
    </script>
</body>
</html>
